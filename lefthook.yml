pre-commit:
  parallel: true
  commands:
    format:
      run: pnpm biome format --write {staged_files}
      stage_fixed: true
    lint:
      run: pnpm biome check {staged_files}
    typecheck:
      run: pnpm turbo run check --filter='...[HEAD]'

commit-msg:
  commands:
    conventional:
      run: npx commitlint --edit "$1"
