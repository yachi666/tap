  typescript: ^5.7.0
  vite: 8.1.0
  "@vitejs/plugin-react": 5.0.4
  tsx: ^4.19.0
  # Test
  vitest: ^3.2.6
  "@types/node": ^22.0.0
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
